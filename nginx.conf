# TutorIngles · Nginx config
# Ruta en el servidor: /etc/nginx/sites-available/tutoringles
# Activar:  ln -s /etc/nginx/sites-available/tutoringles /etc/nginx/sites-enabled/
# Recargar: nginx -t && systemctl reload nginx
#
# ⚠️  SUSTITUYE "tutoringles.example.com" por tu dominio real antes de usar
#     Y el certificado SSL correspondiente (certbot --nginx -d tutoringles.example.com)

server {
    listen 80;
    server_name tutoringles.example.com www.tutoringles.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name tutoringles.example.com www.tutoringles.example.com;

    ssl_certificate     /etc/letsencrypt/live/tutoringles.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tutoringles.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Gzip
    gzip on;
    gzip_types text/html application/javascript application/json text/css;

    # ── Backend API (Node.js :3400) ────────────────────────────
    location ~ ^/(words|user-words|grammar-topics|grammar-progress|study-sessions|daily-goals|speaking-practice|exam-attempts|stats|config|auth|health)(/.*)?$ {
        proxy_pass         http://127.0.0.1:3400;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── PWA estática / catch-all ───────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3400;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }
}
